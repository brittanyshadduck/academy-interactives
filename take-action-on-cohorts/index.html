<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Use Your Cohorts — Amplitude Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; height: 684px; overflow: hidden; background: transparent; font-family: 'IBM Plex Sans', sans-serif; }
button { font-family: 'IBM Plex Sans', sans-serif; }
.cl-scroll::-webkit-scrollbar { width: 9px; }
.cl-scroll::-webkit-scrollbar-thumb { background: #d5d9e0; border-radius: 99px; border: 2px solid #fff; }
</style>
</head>
<body>

<div id="app" style="width:100%;max-width:1000px;height:684px;margin:0 auto;background:#fff;border:1px solid #dedfe2;border-radius:16px;overflow:hidden;color:#1e2024;display:flex;">

  <!-- SIDEBAR -->
  <aside style="width:272px;flex:none;background:#fbfcfd;border-right:1px solid #dedfe2;display:flex;flex-direction:column;">
    <div style="padding:22px 22px 14px;">
      <h1 style="font-family:'IBM Plex Sans',sans-serif;font-weight:500;font-size:20px;line-height:27px;letter-spacing:-.3px;color:#1e2024;margin:0;">Use your cohorts</h1>
    </div>
    <nav id="nav" style="padding:4px 12px 14px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;"></nav>
  </aside>

  <!-- CONTENT -->
  <section style="position:relative;flex:1;min-width:0;display:flex;flex-direction:column;background:#fff;">
    <div id="content" class="cl-scroll" style="overflow-y:auto;height:100%;padding:30px 34px 28px;"></div>
  </section>

</div>

<script>
const ACCENT = '#1e61f0';

const TABS = [
  'Analyze your cohorts in charts',
  'Target your cohorts in an experiment',
  'Target your cohorts with a guide or survey',
  'Sync your cohorts to a downstream destination',
];

const CHART_STEPS = [
  { label: 'The cohort', img: 'assets/social-cohort.png', caption: '<strong style="color:#1e2024;">The cohort.</strong> Socially engaged users, defined as anyone who added a friend or shared a song or video at least once in the last 30 days.' },
  { label: 'Segment', img: 'assets/segment.png', caption: '<strong style="color:#1e2024;">Segment by cohort.</strong> In a Retention chart, open <strong style="color:#1e2024;font-weight:600;">Segment by</strong>, click <strong style="color:#1e2024;font-weight:600;">+In Cohort</strong>, and choose your cohort.' },
  { label: 'Compare', img: 'assets/isnot.png', caption: '<strong style="color:#1e2024;">Add a comparison.</strong> Click <strong style="color:#1e2024;font-weight:600;">+Add Segment</strong>, pick the same cohort, then switch the condition from <strong style="color:#1e2024;font-weight:600;">is</strong> to <strong style="color:#1e2024;font-weight:600;">is not</strong>.' },
  { label: 'Result', img: 'assets/result.png', caption: '<strong style="color:#1e2024;">Read the result.</strong> Socially engaged users (blue) retain well above users who aren\'t (green), so the social hypothesis holds.' },
];

let state = { tab: 0, step: 0 };

function navStyle(i) {
  const active = state.tab === i;
  return 'display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px 11px;border-radius:10px;cursor:pointer;font-family:inherit;transition:background .12s,border-color .12s;border:1px solid ' + (active ? '#b1d3ff' : 'transparent') + ';background:' + (active ? '#ebf5ff' : 'transparent') + ';';
}
function badgeStyle(i) {
  const active = state.tab === i;
  return 'flex:none;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;font-family:inherit;background:' + (active ? ACCENT : '#eef0f2') + ';color:' + (active ? '#ffffff' : '#6f7480') + ';';
}
function navLabelStyle(i) {
  const active = state.tab === i;
  return 'flex:1;min-width:0;font-size:13.5px;font-weight:400;line-height:1.3;color:' + (active ? ACCENT : '#1e2024') + ';';
}

function stepDotStyle(i) {
  const s = state.step;
  let css = 'width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:12.5px;font-weight:600;transition:all .2s;box-sizing:border-box;';
  if (i < s)        css += 'background:' + ACCENT + ';color:#fff;border:1.5px solid ' + ACCENT + ';';
  else if (i === s) css += 'background:' + ACCENT + ';color:#fff;border:1.5px solid ' + ACCENT + ';box-shadow:0 0 0 4px rgba(30,97,240,.16);';
  else              css += 'background:#fff;color:#9098a1;border:1.5px solid #d5d9e0;';
  return css;
}
function stepLblStyle(i) {
  const reached = i <= state.step;
  return 'font-size:11.5px;line-height:1.25;text-align:center;transition:color .2s;' + (reached ? 'color:#1e2024;font-weight:600;' : 'color:#9098a1;font-weight:500;');
}
function stepConnStyle(i) {
  return 'flex:1;height:2px;margin-top:13px;border-radius:2px;transition:background .25s;background:' + (state.step >= i ? ACCENT : '#dedfe2') + ';';
}
function navBtnStyle(disabled, primary) {
  let s = 'display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-weight:500;font-size:13px;padding:8px 15px;border-radius:9px;cursor:pointer;transition:opacity .15s;';
  s += primary ? 'background:' + ACCENT + ';color:#fff;border:1px solid ' + ACCENT + ';' : 'background:#fff;color:#35373d;border:1px solid #d5d9e0;';
  if (disabled) s += 'opacity:.35;pointer-events:none;';
  return s;
}
function imgBox(src, alt) {
  return '<div style="border-radius:12px;overflow:hidden;border:1px solid #dedfe2;box-shadow:0 4px 18px rgba(16,19,26,.08);background:#f5f6f8;"><img src="' + src + '" alt="' + alt + '" style="display:block;width:100%;"></div>';
}
const H2 = 'font-family:\'IBM Plex Sans\',sans-serif;margin:0 0 8px;font-size:24px;font-weight:500;letter-spacing:-.3px;line-height:32px;color:#1e2024;';
const LEAD = 'margin:0 0 20px;font-size:14px;line-height:22px;color:#5a5e68;';

function contentHTML() {
  const tab = state.tab;
  const st = state.step;

  if (tab === 0) {
    const dots = [0,1,2,3].map(i =>
      '<button onclick="setStep(' + i + ')" style="display:flex;flex-direction:column;align-items:center;gap:7px;background:none;border:0;cursor:pointer;padding:0;font-family:inherit;width:78px;flex-shrink:0;">' +
      '<span style="' + stepDotStyle(i) + '">' + (st > i ? '✓' : (i + 1)) + '</span>' +
      '<span style="' + stepLblStyle(i) + '">' + CHART_STEPS[i].label + '</span>' +
      '</button>'
    );
    const conns = [1,2,3].map(i => '<div style="' + stepConnStyle(i) + '"></div>');
    const row = [dots[0], conns[0], dots[1], conns[1], dots[2], conns[2], dots[3]].join('');
    return '<div style="max-width:660px;">' +
      '<h2 style="' + H2 + '">Analyze cohorts in charts</h2>' +
      '<p style="margin:0 0 18px;font-size:14px;line-height:22px;color:#5a5e68;">Add a cohort to any chart\'s segmentation module to study one group. AmpliTunes wants to know: do socially engaged users retain better than everyone else?</p>' +
      '<div style="display:flex;align-items:flex-start;margin-bottom:18px;">' + row + '</div>' +
      imgBox(CHART_STEPS[st].img, 'Retention analysis step') +
      '<div style="margin-top:14px;min-height:54px;font-size:14px;line-height:22px;color:#35373d;">' + CHART_STEPS[st].caption + '</div>' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;">' +
      '<button onclick="prevStep()" style="' + navBtnStyle(st === 0, false) + '"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>Back</button>' +
      '<div style="font-size:12.5px;font-weight:500;color:#8a8e99;">Step ' + (st + 1) + ' of 4</div>' +
      '<button onclick="nextStep()" style="' + navBtnStyle(st === 3, true) + '">Next<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>' +
      '</div></div>';
  }

  if (tab === 1) {
    return '<div style="max-width:660px;">' +
      '<h2 style="' + H2 + '">Target cohorts in Experiment</h2>' +
      '<p style="' + LEAD + '">Rolling out a feature or running an A/B test? When you define the audience, choose Targeted Users to target one or more saved cohorts, then set rollout and distribution as usual.</p>' +
      imgBox('assets/experiment.png', 'Experiment assignment targeting') +
      '<div style="margin-top:14px;font-size:13px;line-height:20px;color:#8a8e99;">See the <a href="https://academy.amplitude.com/getting-started-with-amplitude-experiment-learning-path" target="_blank" rel="noopener" style="color:#1e61f0;text-decoration:none;">Getting Started with Feature Experiment</a> course for full setup.</div>' +
      '</div>';
  }

  if (tab === 2) {
    return '<div style="max-width:660px;">' +
      '<h2 style="' + H2 + '">Target cohorts in Guides &amp; Surveys</h2>' +
      '<p style="' + LEAD + '">Deliver in-product messages and surveys to the right people. In the <strong style="color:#1e2024;font-weight:600;">Setup</strong> tab\'s Targeting section, select <strong style="color:#1e2024;font-weight:600;">Targeted Users</strong> and apply one or more cohorts.</p>' +
      imgBox('assets/guides.png', 'Guides and Surveys targeting') +
      '<div style="margin-top:14px;font-size:13px;line-height:20px;color:#8a8e99;">Learn more in the <a href="https://academy.amplitude.com/engage-your-users-with-guides-and-surveys" target="_blank" rel="noopener" style="color:#1e61f0;text-decoration:none;">Engage Your Users with Guides and Surveys</a> course.</div>' +
      '</div>';
  }

  if (tab === 3) {
    return '<div style="max-width:660px;">' +
      '<h2 style="' + H2 + '">Sync cohorts downstream</h2>' +
      '<p style="' + LEAD + '">Send cohorts to third-party tools with manual or automatic syncs. Example: sync a cohort of funnel drop-offs to Braze and launch a re-engagement campaign to win them back.</p>' +
      imgBox('assets/sync.png', 'Sync this cohort to destinations') +
      '</div>';
  }

  return '';
}

function render() {
  document.getElementById('nav').innerHTML = TABS.map((label, i) =>
    '<button onclick="selectTab(' + i + ')" style="' + navStyle(i) + '">' +
    '<span style="' + badgeStyle(i) + '">' + (i + 1) + '</span>' +
    '<span style="' + navLabelStyle(i) + '">' + label + '</span>' +
    '</button>'
  ).join('');
  document.getElementById('content').innerHTML = contentHTML();
}

function selectTab(i) { state.tab = i; state.step = 0; render(); }
function setStep(i)   { state.step = i; render(); }
function prevStep()   { if (state.step > 0) { state.step--; render(); } }
function nextStep()   { if (state.step < 3) { state.step++; render(); } }

render();
</script>
</body>
</html>
